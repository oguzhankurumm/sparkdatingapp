services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spark_dev
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark_local_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d spark_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: spark_minio
      MINIO_ROOT_PASSWORD: spark_minio_123
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
